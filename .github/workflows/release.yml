name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained (win-x64)
        shell: bash
        working-directory: win
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          dotnet publish BreatheWidget.App/BreatheWidget.App.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:Version="${VERSION}" \
            -p:InformationalVersion="${TAG}" \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "${GITHUB_WORKSPACE}/artifacts/app"

      - name: Zip portable folder
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $app = Join-Path $env:GITHUB_WORKSPACE "artifacts/app"
          $t = $env:TAG
          $zip = Join-Path $env:GITHUB_WORKSPACE "artifacts/BreatheWidget-$t-win-x64-portable.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $app "*") -DestinationPath $zip
          Get-Item $zip | Format-List Name, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/BreatheWidget-${{ github.ref_name }}-win-x64-portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
